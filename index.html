<!DOCTYPE html>
<html lang="az">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valyuta dəyişdir</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="headertext">

        <img src="./images/logo.svg" alt="Logo">

        <ol>
            <li class="banktext">BANK</li>
            <li>BIZNES</li>
            <li>FERDI</li>
            <li>KART</li>
            <li>ONLINE</li>
            <li>MURACIET</li>
            <li>HAQQIMIZDA</li>
        </ol>

        <button class="login-btn">LOGIN</button>

    </header>



    <h1>Valyuta dəyişdir</h1>



    <div class="container">


  
        <div class="box box1">

            <p>Daxil et/Dəyiş</p>

            <div class="currency-select" id="fromCurrency">

                <button class="active3 active">RUB</button>
                <button>USD</button>
                <button>EUR</button>
                <button class="active4 active2">GBP</button>

            </div>

            <div class="input-box">

                <input type="text">
                <p class="info"></p>
            </div>

        </div>





      
        <div class="box">

            <p>Daxil et/Dəyiş</p>

            <div class="currency-select" id="toCurrency">

                <button class="active3 active">RUB</button>
                <button>USD</button>
                <button>EUR</button>
                <button class="active4 active2">GBP</button>

            </div>

            <div class="input-box">

                <input type="text">
                <p class="info"></p>
            </div>

        </div>



  
        <div class="box">

            <p>Hansı bank?</p>

            <div class="currency-select" id="bankSelect">

                <button class="active3 active">ABC</button>
                <button>NEW</button>
                <button>AME</button>
                <button class="active4 active2">RED</button>

            </div>



            <div class="result">

                <div class="buy">BUY</div>
                <div class="value"></div>

            </div>



            <div class="result">

                <div class="sell">SELL</div>
                <div class="value"></div>

            </div>

        </div>



    </div>



    <script src="script.js"></script>

</body>

</html>
